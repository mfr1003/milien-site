<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LodgeMiLien Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0d1117; --ink-soft: #1c2333; --steel: #2a3347;
    --amber: #f5a623; --amber-dark: #d4891a;
    --white: #ffffff; --muted: #7a8499; --border: rgba(255,255,255,0.08);
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--ink); color: var(--white); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-box {
    background: var(--ink-soft); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 360px;
  }
  .login-box h1 {
    font-family: var(--font-display); font-size: 28px; font-weight: 800;
    text-transform: uppercase; margin-bottom: 24px;
  }
  .login-box h1 span { color: var(--amber); }
  .login-input {
    width: 100%; background: var(--steel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; font-family: var(--font-body);
    font-size: 16px; color: var(--white); outline: none; margin-bottom: 12px;
  }
  .login-input:focus { border-color: var(--amber); }
  .login-btn {
    width: 100%; background: var(--amber); color: var(--ink);
    border: none; border-radius: 8px; padding: 14px;
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    text-transform: uppercase; cursor: pointer;
  }
  .login-btn:hover { background: var(--amber-dark); }
  .login-error { color: #e84040; font-size: 13px; margin-top: 8px; display: none; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }
  nav {
    background: rgba(13,17,23,0.95); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: var(--font-display); font-weight: 800; font-size: 24px; color: var(--white); }
  .logo span { color: var(--amber); }
  .logout-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 8px 16px; border-radius: 6px; font-family: var(--font-body);
    font-size: 13px; cursor: pointer;
  }
  .logout-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }

  .main { padding: 32px 24px; max-width: 1100px; margin: 0 auto; }
  .page-title {
    font-family: var(--font-display); font-size: 36px; font-weight: 800;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .orders-list { display: flex; flex-direction: column; gap: 16px; }

  .order-card {
    background: var(--ink-soft); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .order-card.urgent { border-color: rgba(232,64,64,0.4); }

  .order-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; gap: 16px; flex-wrap: wrap;
  }
  .order-meta { flex: 1; min-width: 200px; }
  .order-name {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .order-detail { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .order-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px; margin-right: 6px;
  }
  .badge-auto { background: rgba(245,166,35,0.15); color: var(--amber); }
  .badge-construction { background: rgba(255,255,255,0.08); color: var(--muted); }
  .badge-filing { background: rgba(46,160,67,0.15); color: #2ea043; }
  .badge-urgent { background: rgba(232,64,64,0.15); color: #e84040; }

  .order-amount {
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    color: var(--amber); white-space: nowrap;
  }

  .order-actions { display: flex; gap: 10px; align-items: center; }

  .btn-view {
    background: var(--steel); border: 1px solid var(--border);
    color: var(--white); padding: 10px 20px; border-radius: 7px;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .btn-view:hover { border-color: rgba(255,255,255,0.25); }

  .btn-approve {
    background: var(--amber); border: none; color: var(--ink);
    padding: 10px 20px; border-radius: 7px;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .btn-approve:hover { background: var(--amber-dark); }
  .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-reject {
    background: transparent; border: 1px solid rgba(232,64,64,0.4); color: #e84040;
    padding: 10px 20px; border-radius: 7px;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .btn-reject:hover { background: rgba(232,64,64,0.1); border-color: #e84040; }
  .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-verify {
    background: transparent; border: 1px solid rgba(30,120,255,0.4); color: #4a9eff;
    padding: 10px 20px; border-radius: 7px;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .btn-verify:hover { background: rgba(30,120,255,0.08); border-color: #4a9eff; }
  .btn-verify:disabled { opacity: 0.4; cursor: not-allowed; }

  .verify-panel {
    display: none; border-top: 1px solid var(--border);
    background: #111b2b; padding: 20px 24px;
  }
  .verify-panel.open { display: block; }
  .verify-row { display: flex; gap: 8px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .verify-row:last-child { border-bottom: none; }
  .verify-label { color: var(--muted); width: 160px; flex-shrink: 0; }
  .verify-value { color: var(--white); flex: 1; }
  .verify-match { color: #2ea043; font-weight: 600; }
  .verify-mismatch { color: #e84040; font-weight: 600; }
  .verify-link { color: #4a9eff; text-decoration: none; font-size: 12px; }
  .verify-link:hover { text-decoration: underline; }
  .verify-section { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; }

  /* ── DOCUMENT PREVIEW PANEL ── */
  .doc-panel {
    display: none; border-top: 1px solid var(--border);
    background: #fff; padding: 0;
  }
  .doc-panel.open { display: block; }
  .doc-panel iframe {
    width: 100%; height: 600px; border: none; display: block;
  }

  /* ── PROOF LINK ── */
  .proof-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: #1a6ef5; font-size: 13px; text-decoration: none;
  }
  .proof-link:hover { text-decoration: underline; }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    text-align: center; padding: 64px 20px;
    color: var(--muted); font-size: 15px;
  }
  .empty-state strong { display: block; font-family: var(--font-display); font-size: 24px; font-weight: 700; text-transform: uppercase; color: var(--white); margin-bottom: 8px; }

  .loading { color: var(--muted); font-size: 14px; padding: 32px 0; }

  .tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid var(--white);
    background: var(--white);
    color: var(--ink);
  }

  .tab-btn.inactive {
    background: transparent;
    color: var(--white);
    border: 2px solid rgba(255,255,255,0.3);
  }

  .tab-btn.inactive:hover {
    border-color: rgba(255,255,255,0.6);
  }

  .tab-section { display: none; }
  .tab-section.active { display: block; }

  .approve-status {
    font-size: 13px; margin-top: 6px; display: none;
  }
  .approve-status.success { color: #2ea043; }
  .approve-status.error { color: #e84040; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Lodge<span>Mi</span>Lien<br>Admin</h1>
    <input type="password" class="login-input" id="password-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav>
    <div class="logo">Lodge<span>Mi</span>Lien <span style="color:var(--muted);font-size:16px;font-weight:600;">Admin</span></div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </nav>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn" id="tab-pending" onclick="switchTab('pending')">Pending Orders</button>
      <button class="tab-btn inactive" id="tab-completed" onclick="switchTab('completed')">Completed Orders</button>
    </div>

    <!-- PENDING TAB -->
    <div class="tab-section active" id="section-pending">
      <div class="page-sub" id="orders-sub">Loading orders...</div>
      <div class="orders-list" id="orders-list"></div>
    </div>

    <!-- COMPLETED TAB -->
    <div class="tab-section" id="section-completed">
      <div class="page-sub" id="completed-sub">Loading completed orders...</div>
      <div class="orders-list" id="completed-list"></div>
    </div>
  </div>
</div>

<script>
  let adminPassword = '';
  let completedLoaded = false;

  // Restore session on page load
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('milien_admin_pw');
    if (saved) {
      adminPassword = saved;
      loadOrders();
    }
  });

  function switchTab(tab) {
    document.getElementById('section-pending').classList.toggle('active', tab === 'pending');
    document.getElementById('section-completed').classList.toggle('active', tab === 'completed');
    document.getElementById('tab-pending').classList.toggle('inactive', tab !== 'pending');
    document.getElementById('tab-completed').classList.toggle('inactive', tab !== 'completed');

    if (tab === 'completed' && !completedLoaded) {
      loadCompletedOrders();
    }
  }

  function login() {
    const pw = document.getElementById('password-input').value;
    if (!pw) return;
    adminPassword = pw;
    localStorage.setItem('milien_admin_pw', pw);
    loadOrders();
  }

  function logout() {
    adminPassword = '';
    localStorage.removeItem('milien_admin_pw');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
  }

  async function loadOrders() {
    try {
      const res = await fetch('/api/pending-orders', {
        headers: { 'Authorization': `Bearer ${adminPassword}` }
      });

      if (res.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        adminPassword = '';
        return;
      }

      document.getElementById('login-error').style.display = 'none';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      const data = await res.json();
      const orders = data.orders || [];

      const sub = document.getElementById('orders-sub');
      const list = document.getElementById('orders-list');

      if (orders.length === 0) {
        sub.textContent = 'No pending orders.';
        list.innerHTML = '<div class="empty-state"><strong>All Clear</strong>No orders awaiting review.</div>';
        return;
      }

      sub.textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''} awaiting review`;
      list.innerHTML = orders.map(order => renderOrderCard(order)).join('');

    } catch (err) {
      document.getElementById('orders-sub').textContent = 'Failed to load orders.';
    }
  }

  function renderOrderCard(order) {
    const m = order.metadata || {};
    const isAuto = m.workType === 'automotive';
    const paidAt = order.paidAt ? new Date(order.paidAt).toLocaleString() : '—';
    const amount = m.amountOwed ? '$' + parseInt(m.amountOwed).toLocaleString() : '—';

    const typeLabel = isAuto
      ? `<span class="order-badge badge-auto">Automotive</span>`
      : `<span class="order-badge badge-construction">Construction</span>`;

    const filingLabel = m.filingCoordination === 'true'
      ? `<span class="order-badge badge-filing">+ Filing Coord</span>` : '';

    const detail = isAuto
      ? `${m.vehicleDescription || '—'} · VIN: ${m.vin || '—'} · ${m.claimantName || '—'}`
      : `${m.propertyAddress || '—'}, ${m.propertyCity || '—'} · ${m.claimantName || '—'}`;

    const proofUrl = m.proofUrl || '';
    const proofLink = proofUrl
      ? `<a href="${proofUrl}" target="_blank" class="proof-link">📎 View Proof of Work</a>`
      : `<span style="color:#e84040;font-size:13px;">⚠ No proof uploaded</span>`;

    return `
      <div class="order-card" id="card-${order.sessionId}">
        <div class="order-header">
          <div class="order-meta">
            <div class="order-name">${m.claimantName || 'Unknown'}</div>
            <div class="order-detail">
              ${typeLabel}${filingLabel}
              <br>${detail}
              <br>${m.claimantEmail || '—'} · ${m.claimantPhone || '—'}
              <br>Paid: ${paidAt} · ${proofLink}
            </div>
          </div>
          <div class="order-amount">${amount}</div>
          <div class="order-actions" style="flex-direction:column;align-items:flex-end;">
            <div style="display:flex;gap:10px;">
              <button class="btn-view" id="toggle-btn-${order.sessionId}" onclick="toggleDocs('${order.sessionId}')" title="View Documents" style="padding:10px 14px;font-size:18px;">›</button>
              <button class="btn-verify" id="verify-btn-${order.sessionId}" onclick="verifyOrder('${order.sessionId}')">Verify</button>
              <button class="btn-reject" id="reject-btn-${order.sessionId}" onclick="rejectOrder('${order.sessionId}', '${m.claimantEmail}')">Reject</button>
              <button class="btn-approve" id="approve-btn-${order.sessionId}" onclick="approveOrder('${order.sessionId}', '${m.claimantEmail}')">Approve & Send</button>
            </div>
            <div class="approve-status" id="approve-status-${order.sessionId}"></div>
          </div>
        </div>
        <div class="doc-panel" id="docs-${order.sessionId}">
          <div style="padding:16px 24px;background:var(--steel);border-top:1px solid var(--border);font-size:13px;color:var(--muted);">
            Loading documents...
          </div>
        </div>
        <div class="verify-panel" id="verify-${order.sessionId}"></div>
      </div>
    `;
  }

  async function toggleDocs(sessionId) {
    const panel = document.getElementById(`docs-${sessionId}`);
    const btn = document.getElementById(`toggle-btn-${sessionId}`);

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      btn.textContent = '›';
      btn.style.transform = 'rotate(0deg)';
      return;
    }

    panel.classList.add('open');
    btn.textContent = '›';
    btn.style.transform = 'rotate(90deg)';
    btn.style.transition = 'transform 0.2s ease';
    panel.innerHTML = '<div style="padding:24px;background:var(--steel);color:var(--muted);font-size:14px;">Loading documents...</div>';

    try {
      const res = await fetch(`/api/get-order?sessionId=${sessionId}`, {
        headers: { 'Authorization': `Bearer ${adminPassword}` }
      });
      const data = await res.json();

      if (data.htmlDocuments) {
        orderDocs[sessionId] = data.htmlDocuments;
        renderDocPanel(sessionId);
      } else {
        panel.innerHTML = '<div style="padding:24px;color:#e84040;font-size:14px;">Documents not found.</div>';
      }
    } catch (err) {
      panel.innerHTML = `<div style="padding:24px;color:#e84040;font-size:14px;">Failed to load: ${err.message}</div>`;
    }
  }

  // Storage for current document HTML per order
  const orderDocs = {};

  function extractPlaceholders(html) {
    const text = html.replace(/<[^>]+>/g, ' ');
    const found = [];
    const seen = new Set();

    // These are informational markers, not fillable fields
    const skipPatterns = [
      /notary seal/i,
      /affix seal/i,
    ];

    // 1 — Detect standard [bracketed] placeholders
    const bracketRegex = /\[([^\]]{3,200})\]/g;
    let match;
    while ((match = bracketRegex.exec(text)) !== null) {
      const inner = match[1].trim();
      if (inner.includes('{') || (inner.includes(':') && inner.length < 8)) continue;
      if (skipPatterns.some(p => p.test(inner))) continue;
      if (!seen.has(inner)) {
        seen.add(inner);
        found.push({ full: `[${inner}]`, inner, unbracketed: false });
      }
    }

    // 2 — Detect known patterns Claude sometimes outputs WITHOUT brackets
    const knownPatterns = [
      { regex: /TO BE CONFIRMED[^.\n]*/gi, label: 'TO BE CONFIRMED — owner name from county records' },
      { regex: /LEGAL DESCRIPTION[^.\n]*obtain[^.\n]*/gi, label: 'LEGAL DESCRIPTION — obtain from county Register of Deeds' },
      { regex: /TAX PARCEL ID[^.\n]*obtain[^.\n]*/gi, label: 'TAX PARCEL ID — obtain from county records' },
      { regex: /LIENHOLDER NAME[^.\n]*obtain[^.\n]*/gi, label: 'LIENHOLDER NAME — obtain from title search' },
      { regex: /ENTER MVSR LICENSE[^.\n]*/gi, label: 'MVSR LICENSE NUMBER — enter before filing' },
    ];

    knownPatterns.forEach(({ regex, label }) => {
      const patternMatch = text.match(regex);
      if (patternMatch && !seen.has(label)) {
        seen.add(label);
        // Use the matched text as the replacement target
        found.push({ full: patternMatch[0].trim(), inner: label, unbracketed: true });
      }
    });

    return found;
  }

  function renderDocPanel(sessionId) {
    const panel = document.getElementById(`docs-${sessionId}`);
    const html = orderDocs[sessionId];
    const placeholders = extractPlaceholders(html);

    const blobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));

    const placeholderRows = placeholders.length > 0
      ? placeholders.map((p, i) => `
          <div style="margin-bottom:12px;">
            <label style="display:block;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:5px;">
              ${p.inner.length > 80 ? p.inner.substring(0, 80) + '...' : p.inner}
            </label>
            <input
              type="text"
              id="ph-${sessionId}-${i}"
              data-placeholder="${escHtml(p.full)}"
              data-unbracketed="${p.unbracketed ? 'true' : 'false'}"
              placeholder="Enter value..."
              style="width:100%;background:#1c2333;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:10px 12px;font-family:Barlow,sans-serif;font-size:14px;color:#fff;outline:none;"
              onfocus="this.style.borderColor='#f5a623'"
              onblur="this.style.borderColor='rgba(255,255,255,0.15)'"
            >
          </div>
        `).join('')
      : '<p style="color:#2ea043;font-size:13px;">✓ No placeholders detected. Documents look complete.</p>';

    panel.innerHTML = `
      <iframe id="iframe-${sessionId}" src="${blobUrl}" style="width:100%;height:600px;border:none;display:block;border-bottom:1px solid rgba(255,255,255,0.08);"></iframe>

      <div style="background:#1c2333;padding:24px;border-top:3px solid #f5a623;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;color:#fff;margin-bottom:4px;">
          Fill In Placeholders Before Sending
        </div>
        <div style="font-size:13px;color:#7a8499;margin-bottom:20px;">
          ${placeholders.length > 0
            ? `${placeholders.length} item${placeholders.length !== 1 ? 's' : ''} need your input. Fill them in, then click Update Preview before approving.`
            : 'All fields appear complete.'}
        </div>
        ${placeholderRows}
        ${placeholders.length > 0 ? `
          <button onclick="applyPlaceholders('${sessionId}')"
            style="background:#f5a623;color:#0d1117;border:none;border-radius:7px;padding:12px 24px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;cursor:pointer;margin-top:4px;">
            Update Preview
          </button>
          <div id="update-status-${sessionId}" style="font-size:13px;margin-top:8px;display:none;"></div>
        ` : ''}
      </div>
    `;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function applyPlaceholders(sessionId) {
    let html = orderDocs[sessionId];
    const panel = document.getElementById(`docs-${sessionId}`);
    const inputs = panel.querySelectorAll('[data-placeholder]');
    let filled = 0;
    let skipped = 0;

    inputs.forEach(input => {
      const value = input.value.trim();
      const placeholder = input.getAttribute('data-placeholder');
      const unbracketed = input.getAttribute('data-unbracketed') === 'true';

      if (value) {
        if (unbracketed) {
          // For unbracketed patterns, replace the raw matched text
          html = html.split(placeholder).join(value);
        } else {
          // For bracketed patterns, replace [text]
          html = html.split(placeholder).join(value);
        }
        filled++;
      } else {
        skipped++;
      }
    });

    orderDocs[sessionId] = html;

    const iframe = document.getElementById(`iframe-${sessionId}`);
    const blobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
    iframe.src = blobUrl;

    const statusEl = document.getElementById(`update-status-${sessionId}`);
    if (skipped === 0) {
      statusEl.textContent = `✓ All ${filled} placeholders filled. Preview updated. Ready to send.`;
      statusEl.style.color = '#2ea043';
    } else {
      statusEl.textContent = `${filled} filled, ${skipped} still empty. Remaining items will appear as-is.`;
      statusEl.style.color = '#f5a623';
    }
    statusEl.style.display = 'block';
  }

  async function approveOrder(sessionId, email) {
    const btn = document.getElementById(`approve-btn-${sessionId}`);
    const status = document.getElementById(`approve-status-${sessionId}`);

    btn.disabled = true;
    btn.textContent = 'Sending...';
    status.style.display = 'none';

    try {
      // Use edited version if available, otherwise let server fetch original
      const editedHtml = orderDocs[sessionId] || null;

      const res = await fetch('/api/approve-order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${adminPassword}`
        },
        body: JSON.stringify({ sessionId, editedHtml }),
      });

      const data = await res.json();

      if (data.success) {
        status.textContent = `✓ Sent to ${email}`;
        status.className = 'approve-status success';
        status.style.display = 'block';
        btn.textContent = 'Sent ✓';

        setTimeout(() => {
          const card = document.getElementById(`card-${sessionId}`);
          if (card) card.style.opacity = '0.4';
        }, 3000);
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Approve & Send';
      status.textContent = '✗ Failed: ' + err.message;
      status.className = 'approve-status error';
      status.style.display = 'block';
    }
  }

  async function verifyOrder(sessionId) {
    const btn = document.getElementById(`verify-btn-${sessionId}`);
    const panel = document.getElementById(`verify-${sessionId}`);

    btn.disabled = true;
    btn.textContent = 'Verifying...';
    panel.innerHTML = '<div style="padding:16px 0;color:var(--muted);font-size:13px;">Running verification...</div>';
    panel.classList.add('open');

    try {
      const res = await fetch('/api/verify-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminPassword}` },
        body: JSON.stringify({ sessionId }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Verification failed');

      if (data.type === 'automotive') {
        renderAutoVerify(panel, data);
      } else {
        renderConstructionVerify(panel, data);
      }

      btn.textContent = 'Re-Verify';
      btn.disabled = false;
    } catch (err) {
      panel.innerHTML = `<div style="color:#e84040;font-size:13px;padding:16px 0;">✗ Verification failed: ${err.message}</div>`;
      btn.textContent = 'Verify';
      btn.disabled = false;
    }
  }

  function renderAutoVerify(panel, data) {
    const d = data.decoded || {};
    const submitted = data.submittedDescription || '—';
    const confidence = data.confidence || 0;
    const confidenceLabel = confidence === 3
      ? '<span class="verify-match">✓ Strong match</span>'
      : confidence >= 1
        ? '<span style="color:#f5a623;">⚠ Partial match — review carefully</span>'
        : '<span class="verify-mismatch">✗ No match — VIN may be wrong</span>';

    const decodedStr = [d.year, d.make, d.model, d.trim].filter(Boolean).join(' ');

    panel.innerHTML = `
      <div class="verify-section">VIN Decode — NHTSA</div>
      <div class="verify-row"><span class="verify-label">VIN</span><span class="verify-value" style="font-family:monospace;">${data.vin}</span></div>
      <div class="verify-row"><span class="verify-label">Decoded</span><span class="verify-value">${decodedStr || 'Unable to decode'}</span></div>
      <div class="verify-row"><span class="verify-label">Body Type</span><span class="verify-value">${d.bodyType || '—'}</span></div>
      <div class="verify-row"><span class="verify-label">Customer submitted</span><span class="verify-value">${submitted}</span></div>
      <div class="verify-row"><span class="verify-label">Match status</span><span class="verify-value">${confidenceLabel}</span></div>
      ${d.errorText && d.errorCode !== '0' ? `<div class="verify-row"><span class="verify-label">NHTSA note</span><span class="verify-value" style="color:#f5a623;font-size:12px;">${d.errorText}</span></div>` : ''}
      <div class="verify-section">Manual Lookup</div>
      <div class="verify-row">
        <span class="verify-label">Title / Lienholder</span>
        <span class="verify-value">
          <a href="${data.mdosLink.url}" target="_blank" class="verify-link">${data.mdosLink.label} ↗</a>
          <span style="color:var(--muted);font-size:11px;margin-left:8px;">${data.mdosLink.note}</span>
        </span>
      </div>
    `;
  }

  function renderConstructionVerify(panel, data) {
    const p = data.propertyData || {};
    const bsa = data.bsaLink || {};
    const google = data.googleLink || {};

    panel.innerHTML = `
      <div class="verify-section">Property Lookup — Claude Web Search</div>
      <div class="verify-row">
        <span class="verify-label">Owner found</span>
        <span class="verify-value ${p.ownerName ? 'verify-match' : 'verify-mismatch'}">${p.ownerName || 'Not found'}</span>
      </div>
      ${p.parcelId ? `<div class="verify-row"><span class="verify-label">Parcel ID</span><span class="verify-value" style="font-family:monospace;">${p.parcelId}</span></div>` : ''}
      ${p.legalDescription ? `<div class="verify-row"><span class="verify-label">Legal description</span><span class="verify-value" style="font-size:12px;">${p.legalDescription}</span></div>` : ''}
      <div class="verify-row"><span class="verify-label">Source</span><span class="verify-value" style="font-size:12px;color:var(--muted);">${p.source || '—'}</span></div>
      <div class="verify-section">Direct County Lookup (Option C)</div>
      <div class="verify-row">
        <span class="verify-label">${bsa.label || 'County Portal'}</span>
        <span class="verify-value">
          <a href="${bsa.url}" target="_blank" class="verify-link">${bsa.url ? 'Open county records ↗' : '—'}</a>
          ${bsa.note ? `<span style="color:var(--muted);font-size:11px;margin-left:8px;">${bsa.note}</span>` : ''}
        </span>
      </div>
      <div class="verify-row">
        <span class="verify-label">Google search</span>
        <span class="verify-value">
          <a href="${google.url}" target="_blank" class="verify-link">Search public records ↗</a>
        </span>
      </div>
    `;
  }

  async function rejectOrder(sessionId, email) {
    const reason = prompt(`Reject this order?\n\nOptionally enter a reason (for your records):\n(Leave blank to reject without a note)`);
    if (reason === null) return; // cancelled

    const rejectBtn = document.getElementById(`reject-btn-${sessionId}`);
    const approveBtn = document.getElementById(`approve-btn-${sessionId}`);
    const status = document.getElementById(`approve-status-${sessionId}`);

    rejectBtn.disabled = true;
    rejectBtn.textContent = 'Rejecting...';
    approveBtn.disabled = true;

    try {
      const res = await fetch('/api/reject-order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${adminPassword}`
        },
        body: JSON.stringify({ sessionId, reason: reason || 'No reason provided' }),
      });

      const data = await res.json();

      if (data.success) {
        status.textContent = `✗ Rejected — ${email}`;
        status.className = 'approve-status error';
        status.style.display = 'block';
        rejectBtn.textContent = 'Rejected';

        setTimeout(() => {
          const card = document.getElementById(`card-${sessionId}`);
          if (card) card.style.opacity = '0.3';
        }, 1500);
      } else {
        throw new Error(data.error || 'Rejection failed');
      }
    } catch (err) {
      rejectBtn.disabled = false;
      rejectBtn.textContent = 'Reject';
      approveBtn.disabled = false;
      status.textContent = '✗ Rejection failed: ' + err.message;
      status.className = 'approve-status error';
      status.style.display = 'block';
    }
  }

  async function loadCompletedOrders() {
    try {
      const res = await fetch('/api/completed-orders', {
        headers: { 'Authorization': `Bearer ${adminPassword}` }
      });
      const data = await res.json();
      const orders = data.orders || [];
      const sub = document.getElementById('completed-sub');
      const list = document.getElementById('completed-list');

      if (orders.length === 0) {
        sub.textContent = 'No completed orders yet.';
        list.innerHTML = '<div class="empty-state"><strong>Nothing Yet</strong>Completed orders will appear here after approval.</div>';
      } else {
        sub.textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''} completed`;
        list.innerHTML = orders.map(order => renderCompletedCard(order)).join('');
      }
      completedLoaded = true;
    } catch (err) {
      document.getElementById('completed-sub').textContent = 'Failed to load completed orders.';
    }
  }

  function renderCompletedCard(order) {
    const m = order.metadata || {};
    const isAuto = m.workType === 'automotive';
    const paidAt = order.paidAt ? new Date(order.paidAt).toLocaleString() : '—';
    const completedAt = order.completedAt ? new Date(order.completedAt).toLocaleString() : '—';
    const amount = m.amountOwed ? '$' + parseInt(m.amountOwed).toLocaleString() : '—';

    const typeLabel = isAuto
      ? `<span class="order-badge badge-auto">Automotive</span>`
      : `<span class="order-badge badge-construction">Construction</span>`;

    const detail = isAuto
      ? `${m.vehicleDescription || '—'} · VIN: ${m.vin || '—'}`
      : `${m.propertyAddress || '—'}, ${m.propertyCity || '—'}`;

    return `
      <div class="order-card" id="card-c-${order.sessionId}" style="opacity:0.85;">
        <div class="order-header">
          <div class="order-meta">
            <div class="order-name">${m.claimantName || 'Unknown'}</div>
            <div class="order-detail">
              ${typeLabel}
              <br>${detail}
              <br>${m.claimantEmail || '—'} · ${m.claimantPhone || '—'}
              <br>Paid: ${paidAt}
            </div>
          </div>
          <div class="order-amount">${amount}</div>
          <div class="order-actions" style="flex-direction:column;align-items:flex-end;">
            <div style="display:flex;gap:10px;align-items:center;">
              <button class="btn-view" id="toggle-btn-c-${order.sessionId}" onclick="toggleCompletedDocs('${order.sessionId}')" title="View Documents" style="padding:10px 14px;font-size:18px;">›</button>
              <div style="text-align:right;">
                <div class="completed-sent">✓ Sent</div>
                <div style="font-size:12px;color:var(--muted);">${completedAt}</div>
                <div style="font-size:12px;color:var(--muted);">${order.emailSentTo || m.claimantEmail || '—'}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="doc-panel" id="docs-c-${order.sessionId}">
          <div style="padding:16px 24px;background:var(--steel);border-top:1px solid var(--border);font-size:13px;color:var(--muted);">
            Loading documents...
          </div>
        </div>
      </div>
    `;
  }

  async function toggleCompletedDocs(sessionId) {
    const panel = document.getElementById(`docs-c-${sessionId}`);
    const btn = document.getElementById(`toggle-btn-c-${sessionId}`);

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      btn.textContent = '›';
      btn.style.transform = 'rotate(0deg)';
      return;
    }

    panel.classList.add('open');
    btn.textContent = '›';
    btn.style.transform = 'rotate(90deg)';
    btn.style.transition = 'transform 0.2s ease';
    panel.innerHTML = '<div style="padding:24px;background:var(--steel);color:var(--muted);font-size:14px;">Loading documents...</div>';

    try {
      const res = await fetch(`/api/get-order?sessionId=${sessionId}&prefix=completed`, {
        headers: { 'Authorization': `Bearer ${adminPassword}` }
      });
      const data = await res.json();

      if (data.htmlDocuments) {
        const blobUrl = URL.createObjectURL(new Blob([data.htmlDocuments], { type: 'text/html' }));
        panel.innerHTML = `<iframe src="${blobUrl}" style="width:100%;height:600px;border:none;display:block;"></iframe>`;
      } else {
        panel.innerHTML = '<div style="padding:24px;color:#e84040;font-size:14px;">Documents not found.</div>';
      }
    } catch (err) {
      panel.innerHTML = `<div style="padding:24px;color:#e84040;font-size:14px;">Failed to load: ${err.message}</div>`;
    }
  }
</script>
</body>
</html>
